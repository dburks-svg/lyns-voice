<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q</title>
    <link rel="stylesheet" href="/src/app/shell.css" />
    <link rel="stylesheet" href="/src/app/terminal/terminal.css" />
  </head>
  <body class="q-app">
    <!-- Full-window holographic orb: a transparent WebGL canvas mounts here and
         glows over the solid background; the FUI panels float on top of it. -->
    <div id="avatar-root"></div>

    <!-- Top HUD: the existing control cluster. Every button/input id and its
         wiring is unchanged (main.ts); only the styling is the new neon HUD.
         Temporary debug controls until the STT/Claude adapters fully drive the
         loop hands-free. -->
    <div id="debug" class="debug-cluster hud-bar">
      <div class="hud-group">
        <button data-state="idle">idle</button>
        <button data-state="listening">listening</button>
        <button data-state="thinking">thinking</button>
        <button data-state="speaking">speaking</button>
      </div>
      <div class="hud-group">
        <input
          id="speak-input"
          class="speak-input"
          type="text"
          placeholder="say something (try &lt;&lt;mood:happy&gt;&gt; hello)"
          autocomplete="off"
        />
        <button id="speak-btn">speak</button>
        <button id="mic-btn">talk</button>
      </div>
      <div class="hud-group">
        <input
          id="claude-dir"
          class="speak-input"
          type="text"
          placeholder="project dir for Claude (it can edit/run there by voice)"
          autocomplete="off"
        />
        <button id="claude-btn">connect claude</button>
      </div>
      <div class="hud-group">
        <button id="terminal-btn">+ terminal</button>
      </div>
    </div>

    <!-- FUI stage: a three-column tactical layout beneath the HUD. Left/right
         columns hold floating telemetry panels; the center cell mounts the
         holographic orb; the footer carries the TAP TO TALK mic. -->
    <main class="stage">
      <aside class="col col-left">
        <!-- Top-left: live conversation transcript (you <-> Q) -->
        <section class="panel panel-transcript">
          <header class="panel-head">
            <span class="led"></span><span class="led"></span><span class="led"></span>
            <span class="panel-title">Transcript</span>
          </header>
          <div id="hud-transcript" class="transcript" aria-live="polite">
            <div class="t-empty">awaiting voice input&hellip;</div>
          </div>
        </section>

        <!-- Bottom-left: live mic oscilloscope (telemetry injects the polyline) -->
        <section class="panel panel-audio">
          <header class="panel-head">
            <span class="panel-title">Audio input</span>
            <span class="panel-tag">mic</span>
          </header>
          <svg id="hud-wave" class="wave" viewBox="0 0 240 64" preserveAspectRatio="none" aria-hidden="true">
            <line class="wave-axis" x1="0" y1="61" x2="240" y2="61" />
          </svg>
        </section>
      </aside>

      <!-- Center column is intentionally empty: the full-window orb shows through
           here, with the side panels floating over its glow. -->
      <div class="col-center" aria-hidden="true"></div>

      <aside class="col col-right">
        <!-- Top-right: tool-activity feed (what Claude is doing this turn) -->
        <section class="panel panel-activity">
          <header class="panel-head">
            <span class="panel-title">Activity</span>
            <span class="panel-tag blink">&#9679;</span>
          </header>
          <div id="hud-activity" class="activity" aria-live="polite">
            <div class="a-empty">idle&hellip;</div>
          </div>
        </section>

        <!-- Bottom-right: session telemetry (tokens / cost / turns / uptime) -->
        <section class="panel panel-session">
          <header class="panel-head">
            <span class="panel-title">Session</span>
          </header>
          <dl class="stats">
            <div class="stat"><dt>TOKENS IN</dt><dd id="hud-tokens-in" class="val">0</dd></div>
            <div class="stat"><dt>TOKENS OUT</dt><dd id="hud-tokens-out" class="val">0</dd></div>
            <div class="stat"><dt>COST</dt><dd id="hud-cost" class="val">$0.00</dd></div>
            <div class="stat"><dt>TURNS</dt><dd id="hud-turns" class="val">0</dd></div>
            <div class="stat"><dt>UPTIME</dt><dd id="hud-uptime" class="val">0:00</dd></div>
          </dl>
        </section>
      </aside>

      <!-- Footer: circular TAP TO TALK mic. Proxies the same listening logic as
           #mic-btn (wired together in main.ts). -->
      <footer class="stage-footer">
        <button id="mic-fab" class="mic-button" type="button" aria-label="Tap to talk">
          <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"
            />
            <path class="mic-stem" d="M6 11a6 6 0 0 0 12 0M12 17v4M9 21h6" />
          </svg>
          <span class="mic-label">TAP TO TALK</span>
        </button>
      </footer>
    </main>

    <!-- Terminal layer: floating draggable/resizable terminal windows -->
    <div id="terminal-layer" class="terminal-layer"></div>

    <!-- Spoken reply caption: keeps replies READABLE even when audio is off.
         Mood markers are stripped before they reach here. -->
    <div id="caption" class="caption" aria-live="polite"></div>

    <!-- Current state label (also reflected onto body[data-state]). -->
    <div id="status" class="status"></div>

    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
