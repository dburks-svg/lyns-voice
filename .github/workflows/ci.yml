name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # `npm install`, not `npm ci`: the lockfile is generated on Windows, but the
      # Vite 8 native toolchain (rolldown/oxc -> @napi-rs/wasm-runtime -> @emnapi/*)
      # resolves a wasm fallback on Linux that Windows never installs, so a
      # Windows-authored lockfile can't satisfy strict `npm ci` here. `npm install`
      # reconciles per-platform. (Private personal repo; strict pinning not needed.)
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
