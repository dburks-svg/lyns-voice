name: CodeQL

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    # Weekly, so newly-disclosed patterns get caught even without a push.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
        # Uploading results requires "code scanning" enabled on the repo (GitHub Advanced
        # Security for private repos, or a public repo). Until then the upload step errors;
        # keep it non-blocking so CI stays green. The analysis still runs each push, and
        # enabling code scanning in Settings > Security turns on the alerts with no change here.
        continue-on-error: true
